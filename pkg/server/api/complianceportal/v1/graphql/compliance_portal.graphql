type CompliancePortal implements Node {
  id: ID!
  active: Boolean!
  slug: String!
  logo: File @goField(forceResolver: true)
  darkLogo: File @goField(forceResolver: true)

  description: String
  websiteUrl: String
  email: String
  headquarterAddress: String
  title: String!

  nonDisclosureAgreement: NonDisclosureAgreement @goField(forceResolver: true)

  viewerSubscription: MailingListSubscriber @goField(forceResolver: true)

  documents(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
    filter: CompliancePortalVisibilityFilter
  ): DocumentConnection! @goField(forceResolver: true)

  audits(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
    filter: CompliancePortalVisibilityFilter
  ): AuditConnection! @goField(forceResolver: true)

  subprocessors(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
    filter: SubprocessorFilter
  ): SubprocessorConnection! @goField(forceResolver: true)

  subprocessorCategories: [SubprocessorCategory!]!
    @goField(forceResolver: true)

  subprocessorCountries: [CountryCode!]! @goField(forceResolver: true)

  references(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
  ): CompliancePortalReferenceConnection! @goField(forceResolver: true)

  commitmentGroups(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
  ): CompliancePortalCommitmentGroupConnection! @goField(forceResolver: true)

  compliancePortalFiles(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
    filter: CompliancePortalVisibilityFilter
  ): CompliancePortalFileConnection! @goField(forceResolver: true)

  complianceFrameworks(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
  ): ComplianceFrameworkConnection! @goField(forceResolver: true)

  customLinks(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
  ): ComplianceCustomLinkConnection! @goField(forceResolver: true)

  updates(
    first: Int
    after: CursorKey
    last: Int
    before: CursorKey
  ): MailingListUpdateConnection! @goField(forceResolver: true)
}

