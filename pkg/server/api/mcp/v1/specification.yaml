info:
  title: Probo MCP Server
  version: 1.0.0
  description: Probo MCP Server API

components:
  schemas:
    EmailAddress:
      type: string
      format: string
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/mail.Addr

    Duration:
      type: string
      description: A duration
      go.probo.inc/mcpgen/type: time.Duration

    OrderDirection:
      type: string
      enum:
        - ASC
        - DESC
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/page.OrderDirection

    VendorOrderField:
      type: string
      enum:
        - CREATED_AT
        - UPDATED_AT
        - NAME
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/coredata.VendorOrderField

    VendorRiskAssessmentOrderField:
      type: string
      enum:
        - CREATED_AT
        - EXPIRES_AT
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/coredata.VendorRiskAssessmentOrderField

    VendorRiskAssessmentOrderBy:
      type: object
      required:
        - field
        - direction
      properties:
        field:
          $ref: "#/components/schemas/VendorRiskAssessmentOrderField"
          description: Vendor risk assessment order field
        direction:
          $ref: "#/components/schemas/OrderDirection"
          description: Vendor risk assessment order direction

    DataSensitivity:
      type: string
      enum:
        - NONE
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/coredata.DataSensitivity

    BusinessImpact:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/coredata.BusinessImpact

    VendorOrderBy:
      type: object
      required:
        - field
        - direction
      properties:
        field:
          $ref: "#/components/schemas/VendorOrderField"
          description: Vendor order field
        direction:
          $ref: "#/components/schemas/OrderDirection"
          description: Vendor order direction

    ProfileOrderBy:
      type: object
      required:
        - field
        - direction
      properties:
        field:
          $ref: "#/components/schemas/ProfileOrderField"
          description: Profile order field
        direction:
          $ref: "#/components/schemas/OrderDirection"
          description: Profile order direction

    ProfileOrderField:
      type: string
      enum:
        - CREATED_AT
        - FULL_NAME
        - KIND
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/coredata.MembershipProfileOrderField

    MembershipRole:
      type: string
      enum:
        - OWNER
        - ADMIN
        - EMPLOYEE
        - VIEWER
        - AUDITOR
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/coredata.MembershipRole

    Profile:
      type: object
      required:
        - id
        - organization_id
        - full_name
        - email_address
        - additional_email_addresses
        - kind
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Profile ID
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        full_name:
          type: string
          description: Full name
        email_address:
          $ref: "#/components/schemas/EmailAddress"
          description: Primary email address
        additional_email_addresses:
          type: array
          items:
            $ref: "#/components/schemas/EmailAddress"
          description: Additional email addresses
        kind:
          type:
            - string
            - "null"
          description: Profile kind
        position:
          type:
            - string
            - "null"
          description: Position
        contract_start_date:
          type:
            - string
            - "null"
          format: date-time
          description: Contract start date
        contract_end_date:
          type:
            - string
            - "null"
          format: date-time
          description: Contract end date
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    ListUsersInput:
      type: object
      required:
        - organization_id
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        order_by:
          $ref: "#/components/schemas/ProfileOrderBy"
          description: User order by
        size:
          type: integer
          description: Page size
        cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Page cursor
        filter:
          type: object
          properties:
            exclude_contract_ended:
              type: boolean
              description: Exclude users with ended contracts

    ListUsersOutput:
      type: object
      required:
        - users
      properties:
        next_cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Next cursor
        users:
          type: array
          items:
            $ref: "#/components/schemas/Profile"

    GID:
      type: string
      format: string
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/gid.GID

    CursorKey:
      type: string
      format: string
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/page.CursorKey

    ListOrganizationsInput:
      type: object
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID

    ListOrganizationsOutput:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"

    Organization:
      type: object
      required:
        - id
        - name
        - description
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        name:
          type: string
          description: Organization name
        description:
          type:
            - string
            - "null"
          description: Organization description
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    ListVendorsInput:
      type: object
      required:
        - organization_id
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        order_by:
          $ref: "#/components/schemas/VendorOrderBy"
          description: Vendor order by
        size:
          type: integer
          description: Page size
        cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Page cursor
        filter:
          type: object
          properties:
            snapshot_id:
              anyOf:
                - $ref: "#/components/schemas/GID"
                - type: "null"
              description: Filter by snapshot ID. Defaults to null, which returns only vendors with no snapshot (current live data). Pass a specific snapshot ID to retrieve vendors as they were at that snapshot.
              default: null

    ListVendorsOutput:
      type: object
      required:
        - vendors
      properties:
        next_cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Next cursor
        vendors:
          type: array
          items:
            $ref: "#/components/schemas/Vendor"

    Vendor:
      type: object
      required:
        - id
        - name
        - organization_id
        - category
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Vendor ID
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        name:
          type: string
          description: Vendor name
        description:
          type:
            - string
            - "null"
          description: Vendor description
        category:
          type: string
          enum:
            - ANALYTICS
            - CLOUD_MONITORING
            - CLOUD_PROVIDER
            - COLLABORATION
            - CUSTOMER_SUPPORT
            - DATA_STORAGE_AND_PROCESSING
            - DOCUMENT_MANAGEMENT
            - EMPLOYEE_MANAGEMENT
            - ENGINEERING
            - FINANCE
            - IDENTITY_PROVIDER
            - IT
            - MARKETING
            - OFFICE_OPERATIONS
            - OTHER
            - PASSWORD_MANAGEMENT
            - PRODUCT_AND_DESIGN
            - PROFESSIONAL_SERVICES
            - RECRUITING
            - SALES
            - SECURITY
            - VERSION_CONTROL
          description: Vendor category
        headquarter_address:
          type:
            - string
            - "null"
          description: Headquarter address
        legal_name:
          type:
            - string
            - "null"
          description: Legal name
        website_url:
          type:
            - string
            - "null"
          description: Website URL
        privacy_policy_url:
          type:
            - string
            - "null"
          description: Privacy policy URL
        service_level_agreement_url:
          type:
            - string
            - "null"
          description: Service level agreement URL
        data_processing_agreement_url:
          type:
            - string
            - "null"
          description: Data processing agreement URL
        business_associate_agreement_url:
          type:
            - string
            - "null"
          description: Business associate agreement URL
        subprocessors_list_url:
          type:
            - string
            - "null"
          description: Subprocessors list URL
        certifications:
          type: array
          items:
            type: string
          description: Certifications
        countries:
          type: array
          items:
            type: string
          description: Countries (ISO 3166-1 alpha-2 country codes)
        business_owner_id:
          anyOf:
            - $ref: "#/components/schemas/GID"
            - type: "null"
          description: Business owner ID
        security_owner_id:
          anyOf:
            - $ref: "#/components/schemas/GID"
            - type: "null"
          description: Security owner ID
        status_page_url:
          type:
            - string
            - "null"
          description: Status page URL
        terms_of_service_url:
          type:
            - string
            - "null"
          description: Terms of service URL
        security_page_url:
          type:
            - string
            - "null"
          description: Security page URL
        trust_page_url:
          type:
            - string
            - "null"
          description: Trust page URL
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    VendorRiskAssessment:
      type: object
      required:
        - id
        - organization_id
        - vendor_id
        - expires_at
        - data_sensitivity
        - business_impact
        - created_at
        - updated_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Vendor risk assessment ID
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        vendor_id:
          $ref: "#/components/schemas/GID"
          description: Vendor ID
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp
        data_sensitivity:
          $ref: "#/components/schemas/DataSensitivity"
          description: Data sensitivity level
        business_impact:
          $ref: "#/components/schemas/BusinessImpact"
          description: Business impact level
        notes:
          type:
            - string
            - "null"
          description: Notes
        snapshot_id:
          anyOf:
            - $ref: "#/components/schemas/GID"
            - type: "null"
          description: Snapshot ID
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    ListVendorRiskAssessmentsInput:
      type: object
      required:
        - vendor_id
      properties:
        vendor_id:
          $ref: "#/components/schemas/GID"
          description: Vendor ID
        order_by:
          $ref: "#/components/schemas/VendorRiskAssessmentOrderBy"
          description: Vendor risk assessment order by
        size:
          type: integer
          description: Page size
        cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Page cursor

    ListVendorRiskAssessmentsOutput:
      type: object
      required:
        - vendor_risk_assessments
      properties:
        next_cursor:
          $ref: "#/components/schemas/CursorKey"
          description: Next cursor
        vendor_risk_assessments:
          type: array
          items:
            $ref: "#/components/schemas/VendorRiskAssessment"

    AddVendorRiskAssessmentInput:
      type: object
      required:
        - vendor_id
        - expires_at
        - data_sensitivity
        - business_impact
      properties:
        vendor_id:
          $ref: "#/components/schemas/GID"
          description: Vendor ID
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp
        data_sensitivity:
          $ref: "#/components/schemas/DataSensitivity"
          description: Data sensitivity level
        business_impact:
          $ref: "#/components/schemas/BusinessImpact"
          description: Business impact level
        notes:
          type: string
          description: Notes

    AddVendorRiskAssessmentOutput:
      type: object
      required:
        - vendor_risk_assessment
      properties:
        vendor_risk_assessment:
          $ref: "#/components/schemas/VendorRiskAssessment"

    AddVendorInput:
      type: object
      required:
        - organization_id
        - name
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        name:
          type: string
          description: Vendor name
        description:
          type: string
          description: Vendor description
        category:
          type: string
          enum:
            - ANALYTICS
            - CLOUD_MONITORING
            - CLOUD_PROVIDER
            - COLLABORATION
            - CUSTOMER_SUPPORT
            - DATA_STORAGE_AND_PROCESSING
            - DOCUMENT_MANAGEMENT
            - EMPLOYEE_MANAGEMENT
            - ENGINEERING
            - FINANCE
            - IDENTITY_PROVIDER
            - IT
            - MARKETING
            - OFFICE_OPERATIONS
            - OTHER
            - PASSWORD_MANAGEMENT
            - PRODUCT_AND_DESIGN
            - PROFESSIONAL_SERVICES
            - RECRUITING
            - SALES
            - SECURITY
            - VERSION_CONTROL
          description: Vendor category
        headquarter_address:
          type: string
          description: Headquarter address
        legal_name:
          type: string
          description: Legal name
        website_url:
          type: string
          description: Website URL
        privacy_policy_url:
          type: string
          description: Privacy policy URL
        service_level_agreement_url:
          type: string
          description: Service level agreement URL
        data_processing_agreement_url:
          type: string
          description: Data processing agreement URL
        business_associate_agreement_url:
          type: string
          description: Business associate agreement URL
        subprocessors_list_url:
          type: string
          description: Subprocessors list URL
        certifications:
          type: array
          items:
            type: string
          description: Certifications
        countries:
          type: array
          items:
            type: string
          description: Countries (ISO 3166-1 alpha-2 country codes)
        business_owner_id:
          $ref: "#/components/schemas/GID"
          description: Business owner ID
        security_owner_id:
          $ref: "#/components/schemas/GID"
          description: Security owner ID
        status_page_url:
          type: string
          description: Status page URL
        terms_of_service_url:
          type: string
          description: Terms of service URL
        security_page_url:
          type: string
          description: Security page URL
        trust_page_url:
          type: string
          description: Trust page URL

    AddVendorOutput:
      type: object
      required:
        - vendor
      properties:
        vendor:
          $ref: "#/components/schemas/Vendor"

    UpdateVendorInput:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Vendor ID
        name:
          type: string
          description: Vendor name
        description:
          type: string
          description: Vendor description
        category:
          type: string
          enum:
            - ANALYTICS
            - CLOUD_MONITORING
            - CLOUD_PROVIDER
            - COLLABORATION
            - CUSTOMER_SUPPORT
            - DATA_STORAGE_AND_PROCESSING
            - DOCUMENT_MANAGEMENT
            - EMPLOYEE_MANAGEMENT
            - ENGINEERING
            - FINANCE
            - IDENTITY_PROVIDER
            - IT
            - MARKETING
            - OFFICE_OPERATIONS
            - OTHER
            - PASSWORD_MANAGEMENT
            - PRODUCT_AND_DESIGN
            - PROFESSIONAL_SERVICES
            - RECRUITING
            - SALES
            - SECURITY
            - VERSION_CONTROL
          description: Vendor category
        headquarter_address:
          type: string
          description: Headquarter address
        legal_name:
          type: string
          description: Legal name
        website_url:
          type: string
          description: Website URL
        privacy_policy_url:
          type: string
          description: Privacy policy URL
        service_level_agreement_url:
          type: string
          description: Service level agreement URL
        data_processing_agreement_url:
          type: string
          description: Data processing agreement URL
        business_associate_agreement_url:
          type: string
          description: Business associate agreement URL
        subprocessors_list_url:
          type: string
          description: Subprocessors list URL
        certifications:
          type: array
          items:
            type: string
          description: Certifications
        countries:
          type: array
          items:
            type: string
          description: Countries (ISO 3166-1 alpha-2 country codes)
        business_owner_id:
          $ref: "#/components/schemas/GID"
          description: Business owner ID
        security_owner_id:
          $ref: "#/components/schemas/GID"
          description: Security owner ID
        status_page_url:
          type: string
          description: Status page URL
        terms_of_service_url:
          type: string
          description: Terms of service URL
        security_page_url:
          type: string
          description: Security page URL
        trust_page_url:
          type: string
          description: Trust page URL

    UpdateVendorOutput:
      type: object
      required:
        - vendor
      properties:
        vendor:
          $ref: "#/components/schemas/Vendor"

    DeleteVendorInput:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Vendor ID

    DeleteVendorOutput:
      type: object
      required:
        - deleted_vendor_id
      properties:
        deleted_vendor_id:
          $ref: "#/components/schemas/GID"
          description: Deleted vendor ID

    GetUserInput:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: User ID (profile ID)

    GetUserOutput:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/Profile"

    CreateUserInput:
      type: object
      required:
        - organization_id
        - full_name
        - email_address
        - role
        - kind
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        full_name:
          type: string
          description: Full name
        email_address:
          $ref: "#/components/schemas/EmailAddress"
          description: Email address
        role:
          $ref: "#/components/schemas/MembershipRole"
          description: Membership role
        additional_email_addresses:
          type: array
          items:
            $ref: "#/components/schemas/EmailAddress"
          description: Additional email addresses
        kind:
          type:
            - string
            - "null"
          description: User kind
        position:
          type: ["string", "null"]
          description: Position
        contract_start_date:
          type: ["string", "null"]
          format: date-time
          description: Contract start date
        contract_end_date:
          type: ["string", "null"]
          format: date-time
          description: Contract end date

    CreateUserOutput:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/Profile"

    InviteUserInput:
      type: object
      required:
        - organization_id
        - profile_id
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        profile_id:
          $ref: "#/components/schemas/GID"
          description: User (profile) ID to invite

    InviteUserOutput:
      type: object
      required:
        - invitation_id
      properties:
        invitation_id:
          $ref: "#/components/schemas/GID"
          description: Created invitation ID

    UpdateUserInput:
      type: object
      required:
        - id
        - full_name
        - kind
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: User (profile) ID
        full_name:
          type: string
          description: Full name
        additional_email_addresses:
          anyOf:
            - type: array
              items:
                $ref: "#/components/schemas/EmailAddress"
            - type: "null"
          description: Additional email addresses
        kind:
          type:
            - string
            - "null"
          description: User kind
        position:
          type: ["string", "null"]
          description: Position
          go.probo.inc/mcpgen/omittable: true
        contract_start_date:
          type: ["string", "null"]
          format: date-time
          description: Contract start date
          go.probo.inc/mcpgen/omittable: true
        contract_end_date:
          type: ["string", "null"]
          format: date-time
          description: Contract end date
          go.probo.inc/mcpgen/omittable: true

    UpdateUserOutput:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/Profile"

    Membership:
      type: object
      required:
        - id
        - role
        - created_at
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Membership ID
        role:
          $ref: "#/components/schemas/MembershipRole"
          description: Membership role
        created_at:
          type: string
          format: date-time
          description: Creation timestamp

    UpdateMembershipInput:
      type: object
      required:
        - organization_id
        - membership_id
        - role
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        membership_id:
          $ref: "#/components/schemas/GID"
          description: Membership ID
        role:
          $ref: "#/components/schemas/MembershipRole"
          description: New role

    UpdateMembershipOutput:
      type: object
      required:
        - membership
      properties:
        membership:
          $ref: "#/components/schemas/Membership"

    RemoveUserInput:
      type: object
      required:
        - organization_id
        - profile_id
      properties:
        organization_id:
          $ref: "#/components/schemas/GID"
          description: Organization ID
        profile_id:
          $ref: "#/components/schemas/GID"
          description: User (profile) ID to remove

    RemoveUserOutput:
      type: object
      required:
        - deleted_user_id
      properties:
        deleted_user_id:
          $ref: "#/components/schemas/GID"
          description: Deleted user (profile) ID

    GetProfileInput:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Profile ID

    GetProfileOutput:
      type: object
      required:
        - profile
      properties:
        profile:
          $ref: "#/components/schemas/Profile"

    UpdateProfileInput:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/GID"
          description: Profile ID
        full_name:
          type: string
          description: Full name
        additional_email_addresses:
          anyOf:
            - type: array
              items:
                $ref: "#/components/schemas/EmailAddress"
            - type: "null"
              description: No additional email addresses
          description: Additional email addresses
        kind:
          anyOf:
            - type: string
            - type: "null"
          description: Profile kind
        position:
          type: ["string", "null"]
          description: Position
          go.probo.inc/mcpgen/omittable: true
        contract_start_date:
          type: ["string", "null"]
          format: date-time
          description: Contract start date
          go.probo.inc/mcpgen/omittable: true
        contract_end_date:
          type: ["string", "null"]
          format: date-time
          description: Contract end date
          go.probo.inc/mcpgen/omittable: true

    UpdateProfileOutput:
      type: object
      required:
        - profile
      properties:
        profile:
          $ref: "#/components/schemas/Profile"

    RiskOrderField:
      type: string
      enum:
        - CREATED_AT
        - UPDATED_AT
        - NAME
        - CATEGORY
        - TREATMENT
        - INHERENT_RISK_SCORE
        - RESIDUAL_RISK_SCORE
        - OWNER_FULL_NAME
      go.probo.inc/mcpgen/type: go.probo.inc/probo/pkg/coredata.RiskOrderField

    RiskOrderBy:
      type: object
      required:
        - field
        - direction
      properties:
        field:
          $ref: "#/components/schemas/RiskOrderField"
