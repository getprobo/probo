        input: UpdateVendorBusinessAssociateAgreementInput!
    ): UpdateVendorBusinessAssociateAgreementPayload!
    deleteVendorBusinessAssociateAgreement(
        input: DeleteVendorBusinessAssociateAgreementInput!
