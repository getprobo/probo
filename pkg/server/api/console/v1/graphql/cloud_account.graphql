        )
    GCP
        @goEnum(
            value: "go.probo.inc/probo/pkg/coredata.CloudAccountProviderGCP"
        )
    AZURE
        @goEnum(
            value: "go.probo.inc/probo/pkg/coredata.CloudAccountProviderAzure"
        )
}

