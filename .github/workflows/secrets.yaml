name: "trufflehog"

on:
  push:
    branches:
      - "main"
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: "runs-on=${{ github.run_id }}/runner=2cpu-linux-x64/extras=s3-cache"
    permissions:
      contents: "read"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: "runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60" # v2
      - uses: "trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51" # main
        with:
          extra_args: "--results=verified,unknown --exclude-paths=.trufflehog-exclude"
