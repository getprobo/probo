server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4317"

ingester:
  trace_idle_period: "10s"
  max_block_bytes: 1_000_000
  max_block_duration: "5m"
  lifecycler:
    ring:
      kvstore:
        store: "inmemory"
      replication_factor: 1

storage:
  trace:
    backend: "local"
    local:
      path: "/var/tempo/blocks"
    wal:
      path: "/var/tempo/wal"
    pool:
      max_workers: 100
      queue_depth: 10000

usage_report:
  reporting_enabled: false
