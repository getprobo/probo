unit:
  metrics:
    addr: "localhost:8081"
  tracing:
    addr: "localhost:4317"
    max-batch-size: 512
    batch-timeout: 1
    export-timeout: 1
    max-queue-size: 2048

probod:
  base-url: "http://localhost:8080"
  encryption-key: "thisisnotasecretAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  chrome-dp-addr: "localhost:9222"

  identity-and-access-management:
    signup:
      enabled: true
      invitation-token-validity: 3600
    password:
      pepper: "this-is-a-secure-pepper-for-password-hashing-at-least-32-bytes"
    session:
      duration: 7d
      cookie:
        name: "SSID"
        domain: "localhost"
        secret: "this-is-a-secure-secret-for-cookie-signing-at-least-32-bytes"
        duration: 24
        secure: false

  trust-center:
    http-addr: ":8085"
    https-addr: ":8443"

  api:
    addr: "localhost:8080"

    default:
      cors:
        allowed-origins:
          - "http://localhost:8080"
          - "http://localhost:5173"
          - "http://localhost:5174"
      extra-header-fields: {}
    console:
    complaince-page:
    connect:
    mcp:

  pg:
    addr: "localhost:5432"
    username: "postgres"
    password: "postgres"
    database: "probod"
    pool-size: 100

  auth:
    disable-signup: false
    invitation-confirmation-token-validity: 3600
    cookie:
      name: "SSID"
      domain: "localhost"
      secret: "this-is-a-secure-secret-for-cookie-signing-at-least-32-bytes"
      duration: 24
      secure: false
    password:
      pepper: "this-is-a-secure-pepper-for-password-hashing-at-least-32-bytes"
      iterations: 1000000

  aws:
    region: "us-east-1"
    bucket: "probod"
    access-key-id: "probod"
    secret-access-key: "thisisnotasecret"
    endpoint: "http://127.0.0.1:8333"

  notifications:
    mailer:
      sender-name: "Probo"
      sender-email: "no-reply@notification.getprobo.com"
      smtp:
        addr: "localhost:1025"
        tls-required: false
      mailer-interval: 60
    slack:
      sender-interval: 60

  llm:
    providers:
      openai:
        type: openai
        api-key: "thisisnotasecret"
    defaults:
      provider: openai
      model-name: gpt-4o
      temperature: 0.1
      max-tokens: 4096

  evidence-describer:
    interval: 10
    stale-after: 300
    max-concurrency: 10

  custom-domains:
    renewal-interval: 3600
    provision-interval: 30
    cname-target: "custom.getprobo.com"
    acme:
      directory: "https://localhost:14000/dir"
      email: "admin@getprobo.com"
      key-type: "EC256"
      root-ca: |
